name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - employee-service
          - client-service
          - account-service
          - transfer-service
          - payment-service
          - exchange-service
          - loan-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
          cache-dependency-path: ${{ matrix.service }}/go.sum

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build ./cmd/server

      - name: Vet
        working-directory: ${{ matrix.service }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test ./...

      - name: Docker build (no push)
        run: |
          case "${{ matrix.service }}" in
            transfer-service|payment-service|exchange-service|loan-service)
              docker build -f "${{ matrix.service }}/Dockerfile" "${{ matrix.service }}"
              ;;
            *)
              cd ..
              docker build -f "EXBanka-3-Backend/${{ matrix.service }}/Dockerfile" .
              ;;
          esac
